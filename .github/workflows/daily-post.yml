name: Daily TikTok Post

# Generates a TikTok-ready video every day. Two modes:
#
#  * Generate-only mode (DEFAULT, no TikTok creds): produces video.mp4
#    + caption + hashtags in posts/<YYYY-MM-DD>/, commits to repo. You
#    open the folder on github.com (works on phone), download the video,
#    upload it to TikTok yourself.
#
#  * Auto-publish mode (when TIKTOK_ACCESS_TOKEN secret exists): same
#    generation, then uploads the video to your TikTok DRAFTS via the
#    official Content Posting API. You open the TikTok app, find the
#    draft in your inbox, tap Post. (Direct publish without manual tap
#    requires a TikTok app review for the developer app.)
#
# Cron runs at 05:00 UTC daily — that's 10am Pakistan / 1am ET / 6am UK.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate the video but do NOT upload to TikTok"
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit the generated video + log back

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-post
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg + chunky fonts
        # Roboto Bold gives the punchy "TikTok caption" look we want;
        # DejaVu/Noto are fallbacks. ffmpeg is preinstalled but we re-install
        # to keep CI deterministic.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-roboto fonts-noto-core fonts-dejavu-core
          ffmpeg -version | head -1
          ls /usr/share/fonts/truetype/roboto/ 2>/dev/null | head -5 || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily video bundle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m src.pipeline_generate

      - name: Check for TikTok credentials
        id: tt
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: |
          REFRESHABLE=$([ -n "$TIKTOK_CLIENT_KEY" ] && [ -n "$TIKTOK_CLIENT_SECRET" ] && [ -n "$TIKTOK_REFRESH_TOKEN" ] && echo "y" || echo "n")
          if [ "$REFRESHABLE" = "y" ]; then
            echo "Auto-publish enabled (auto-refresh mode)."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$TIKTOK_ACCESS_TOKEN" ]; then
            echo "Auto-publish enabled (static token; expires in 24h)."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Generate-only mode (no TikTok credentials configured)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated artifacts
        run: |
          git config user.name "ig-auto-poster[bot]"
          git config user.email "ig-auto-poster@users.noreply.github.com"
          git add posts/ pending_post.json posted_log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "post: daily content $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Publish to TikTok (drafts inbox)
        if: ${{ inputs.dry_run != true && steps.tt.outputs.enabled == 'true' }}
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_DIRECT_PUBLISH: ${{ secrets.TIKTOK_DIRECT_PUBLISH }}
        run: |
          python -m src.pipeline_publish

      - name: Commit final log
        if: ${{ always() && inputs.dry_run != true && steps.tt.outputs.enabled == 'true' }}
        run: |
          git config user.name "ig-auto-poster[bot]"
          git config user.email "ig-auto-poster@users.noreply.github.com"
          git pull --rebase || true
          git add posted_log.json pending_post.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: log post result $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
