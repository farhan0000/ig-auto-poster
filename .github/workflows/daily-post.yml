name: Daily Instagram Post

# Generates a fresh post every day. Two modes:
#
#  * Generate-only mode (DEFAULT, no IG creds): produces image + caption
#    + hashtags, drops them in posts/<YYYY-MM-DD>/, commits to repo. You
#    open the folder on github.com (works on phone), copy the caption,
#    save the image, post manually in the IG app. ~60 seconds of work.
#
#  * Auto-publish mode (when IG_USER_ID + IG_ACCESS_TOKEN secrets exist):
#    same generation, then automatically posts to Instagram via the IG
#    Graph API. The publish step is skipped if those secrets are empty.
#
# In generate-only mode, posting time-of-day matters less since YOU pick
# when to post. We still run on a varied schedule so the content is ready
# for you in the morning regardless of where you are.
on:
  schedule:
    # Every day at 05:00 UTC. That's 10am Pakistan / 1am ET / 6am UK / 3pm
    # Sydney — which means by the time most users open IG, today's post is
    # already waiting in the repo. Adjust to taste.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate but do NOT publish to Instagram"
        type: boolean
        default: false
      skip_jitter:
        description: "Skip the 0-25min random delay (for manual runs)"
        type: boolean
        default: true

permissions:
  contents: write   # needed to commit the generated image + log back

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-post
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random jitter (0-25 min)
        # Only on scheduled runs, not on manual workflow_dispatch.
        # Posting at 14:00:00 every day is a tell that you're automated.
        # We sleep a random 0-1500s here so the actual post time drifts
        # within a ~25min window around the cron tick.
        if: ${{ github.event_name == 'schedule' && inputs.skip_jitter != true }}
        run: |
          DELAY=$((RANDOM % 1500))
          echo "Sleeping ${DELAY}s before posting..."
          sleep $DELAY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute GH_RAW_BASE
        id: rawbase
        run: |
          echo "url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate image (commit before publishing)
        # We split into two python invocations: first generate the image and
        # commit it so it has a stable public URL; THEN publish to IG which
        # fetches the URL.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_RAW_BASE: ${{ steps.rawbase.outputs.url }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          STAGE: generate
        run: |
          python -m src.pipeline_generate

      - name: Check for IG credentials
        id: ig
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ -n "$IG_USER_ID" ] && [ -n "$IG_ACCESS_TOKEN" ]; then
            echo "Auto-publish enabled."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Generate-only mode (no IG credentials configured)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated artifacts
        run: |
          git config user.name "ig-auto-poster[bot]"
          git config user.email "ig-auto-poster@users.noreply.github.com"
          git add images/ posts/ pending_post.json posted_log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "post: daily content $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Publish to Instagram
        if: ${{ inputs.dry_run != true && steps.ig.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_RAW_BASE: ${{ steps.rawbase.outputs.url }}
        run: |
          # raw.githubusercontent.com can take a few seconds to surface a
          # newly-pushed file; give it a moment.
          sleep 15
          python -m src.pipeline_publish

      - name: Commit final log
        if: ${{ always() && inputs.dry_run != true && steps.ig.outputs.enabled == 'true' }}
        run: |
          git config user.name "ig-auto-poster[bot]"
          git config user.email "ig-auto-poster@users.noreply.github.com"
          git pull --rebase || true
          git add posted_log.json pending_post.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: log post result $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
