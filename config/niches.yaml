# Single niche: Tech & Gadgets, optimized for TikTok For You algorithm
# and matched to the_gadget_city_ brand.
#
# We don't rotate across niches anymore — focus wins on TikTok.
# Instead we rotate across angle "buckets" within the niche so videos
# stay varied: some unboxings, some "this gadget actually saves you money",
# some hidden iOS/Android features, some comparisons, etc.
#
# Country target = US (highest tech ad spend, best Amazon Associates payouts).
# TikTok For You will push to other English markets organically when content
# engages. Caption + hook tone is tuned for US viewers.

audience_countries:
  - US
  - UK
  - CA
  - AU
language: English
brand:
  handle_tiktok: "@thegadgetcity_01"
  handle_instagram: "@the_gadget_city_"
  voice: "Punchy, no-fluff tech reviewer. Speaks like a friend who tested it. Confident but not bro-y."

niche: Tech & Gadgets

angle_buckets:
  - bucket: hidden_features
    weight: 4
    description: "Underused features built into devices people already own."
    examples:
      - "iPhone hidden setting that doubles your battery life on long days"
      - "Android shortcut to record calls without an app"
      - "AirPods feature that translates conversations live"
      - "Apple Watch trick that finds your phone even on silent"

  - bucket: gadgets_that_save_money
    weight: 4
    description: "Cheap gadgets that replace something expensive."
    examples:
      - "$15 device that replaces a $300 home security system"
      - "USB-C tester that pays for itself the first time you spot a bad cable"
      - "Wi-fi extender vs mesh — when each actually wins"
      - "Off-brand SSDs that benchmark within 5% of Samsung at half the price"

  - bucket: under_the_radar_gadgets
    weight: 3
    description: "Lesser-known products that feel like cheat codes."
    examples:
      - "The $30 headphones engineers actually use at their desks"
      - "Magnetic charging cables that survive backpack abuse"
      - "Mini portable monitor that turns any laptop into a dual-screen setup"

  - bucket: don_t_buy_this
    weight: 2
    description: "Popular products that aren't worth it. Saves viewers money, builds trust."
    examples:
      - "Three smart-home gadgets that feel cool but you'll unplug in 2 weeks"
      - "Why 'gaming' branded keyboards are usually overpriced regular keyboards"
      - "When NOT to buy a smartwatch"

  - bucket: setup_and_workflow
    weight: 3
    description: "How to set up gadgets you already own to actually be useful."
    examples:
      - "Three iPhone settings to change the day you buy it"
      - "Best free apps to turn an old phone into a security camera"
      - "How to extend your laptop battery from 4 hours to 7 with one settings change"

  - bucket: comparison
    weight: 2
    description: "Head-to-head comparisons. Builds authority, gets engagement."
    examples:
      - "$50 vs $300 webcam: can you actually tell?"
      - "Wired earbuds vs wireless for calls — surprising winner"
      - "iPad vs cheap Android tablet for couch use"

  - bucket: ai_and_software
    weight: 2
    description: "AI tools and software that meaningfully change how you use your phone/computer."
    examples:
      - "Free AI tool that summarizes any YouTube video in 10 seconds"
      - "ChatGPT settings most people miss"
      - "On-device transcription apps that don't send your audio anywhere"
